[package]
name = "miniorm"
version = "0.3.0"
edition = "2021"
authors = ["Cédric Meuter <cedric.meuter@gmail.com>"]
description = "a *very* simple ORM built on top of sqlx"
readme = "README.md"
license = "MIT"
keywords = ["sqlx", "orm"]
homepage = "https://github.com/meuter/miniorm-rs"
repository = "https://github.com/meuter/miniorm-rs"

[dependencies]
# mandatory dependencies
dotenv = "0.15.0"
itertools = "0.12.1"
miniorm-macros = { version = "0.3.0", path = "macros" }
sqlx = { version = "0.7.4", features = ["postgres", "macros"] }
tokio = { version = "1.36.0", features = ["full"] }

# optional dependencies
axum = { version = "0.7.4", optional = true }
serde = { version = "1.0.197", features = ["derive"], optional = true }

[workspace]
members = ["macros", "examples/todo", "examples/transactions", "examples/axum"]

[features]
default = ["axum"]
serde = ["dep:serde"]
axum = ["serde", "dep:axum"]

[dev-dependencies]
http-body-util = "0.1.1"
serde_json = "1.0.114"
sqlx = { version = "0.7.4", features = ["runtime-tokio"] }
tower = "0.4.13"
