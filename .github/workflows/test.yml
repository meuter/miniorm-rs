name: Test

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v2
      - name: test with default feature
        run: cargo test
      - name: test with all features
        run: cargo test --all-features
      - name: test without any feature
        run: cargo test --no-default-features
      - name: test each features individually
        run: |
          cargo test --no-default-features -F serde
          cargo test --no-default-features -F axum
          cargo test --no-default-features -F full
      - name: test the workspace (including all example)
        run: cargo test --workspace
